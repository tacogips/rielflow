version: '3'

vars:
  PROJECT_NAME: divedra

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - bun install

  dev:
    desc: Run in development mode with watch
    cmds:
      - bun run dev

  build:
    desc: Build the project
    cmds:
      - bun run build

  start:
    desc: Run the application
    cmds:
      - bun run start

  test:
    desc: Run tests with Vitest
    cmds:
      - bun run test

  test-e2e:
    desc: Run Playwright E2E tests
    cmds:
      - bun run test:e2e

  test-all:
    desc: Run unit and Playwright E2E tests
    cmds:
      - bun run test:all

  test-watch:
    desc: Run tests in watch mode with Vitest
    cmds:
      - bun run test:watch

  test-verbose:
    desc: Run tests with verbose output
    cmds:
      - vitest run --reporter=verbose

  test-ui:
    desc: Run UI unit tests non-interactively
    cmds:
      - bun run test:ui

  test-ui-interactive:
    desc: Run the interactive Vitest UI server (opt-in)
    cmds:
      - bun run test:ui:interactive

  typecheck:
    desc: Run server and UI TypeScript type checking
    cmds:
      - bun run typecheck

  typecheck-server:
    desc: Run server TypeScript type checking
    cmds:
      - bun run typecheck:server

  typecheck-ui:
    desc: Run framework-aware UI type checking
    cmds:
      - bun run typecheck:ui

  check-ui:
    desc: Run framework-aware UI verification and production build
    cmds:
      - bun run check:ui

  fmt:
    desc: Format code with prettier
    cmds:
      - bun run format

  fmt-check:
    desc: Check code formatting
    cmds:
      - bun run format:check

  lint:
    desc: Run all lints (format check + typecheck)
    cmds:
      - task: fmt-check
      - task: typecheck

  clean:
    desc: Clean build artifacts
    cmds:
      - bun run clean

  ci:
    desc: Run all CI checks
    cmds:
      - task: fmt-check
      - task: typecheck
      - task: test-all
