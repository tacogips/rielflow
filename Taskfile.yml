version: '3'

vars:
  PROJECT_NAME: divedra

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  install:
    desc: Install dependencies
    cmds:
      - bun install

  dev:
    desc: Run in development mode with watch
    cmds:
      - bun run dev

  build:
    desc: Build the project
    cmds:
      - bun run build

  start:
    desc: Run the application
    cmds:
      - bun run start

  test:
    desc: Run tests with Vitest
    cmds:
      - bun run test

  test-all:
    desc: Run all automated tests
    cmds:
      - bun run test:all

  test-watch:
    desc: Run tests in watch mode with Vitest
    cmds:
      - bun run test:watch

  test-verbose:
    desc: Run tests with verbose output
    cmds:
      - vitest run --reporter=verbose

  typecheck:
    desc: Run TypeScript type checking
    cmds:
      - bun run typecheck

  typecheck-server:
    desc: Run TypeScript type checking
    cmds:
      - bun run typecheck:server

  fmt:
    desc: Format code with prettier
    cmds:
      - bun run format

  fmt-check:
    desc: Check code formatting
    cmds:
      - bun run format:check

  lint:
    desc: Run all lints (format check + typecheck)
    cmds:
      - task: fmt-check
      - task: typecheck

  clean:
    desc: Clean build artifacts
    cmds:
      - bun run clean

  ci:
    desc: Run all CI checks
    cmds:
      - task: fmt-check
      - task: typecheck
      - task: test

  nix-bin:
    desc: Build the default flake package and open a shell with its bin dir prepended to PATH (pass a command after `--` to run it instead)
    interactive: true
    env:
      TASK_NIX_BIN_ARGS: '{{.CLI_ARGS}}'
    cmds:
      - |
        set -euo pipefail
        result_path="$(nix build .#default --print-out-paths --no-link | tail -n 1)"
        export PATH="${result_path}/bin:${PATH}"

        if [ -n "${TASK_NIX_BIN_ARGS}" ]; then
          exec bash -lc "${TASK_NIX_BIN_ARGS}"
        fi

        echo "Temporary PATH includes ${result_path}/bin"
        exec "${SHELL:-bash}" -i
